<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popup Example</title>

  <!-- Google Font: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* Global Style */
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f0f0f0;
      text-align: center;
      padding-top: 100px;
    }

    /* Show Popup Button */
    .show-popup-btn {
      background-color: #ee3124;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .show-popup-btn:hover {
      background-color: #c6281e;
    }

    /* Overlay background */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      /* Hidden initially */
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    /* Popup box */
    .popup-box {
      background: #fff;
      padding: 50px 100px;
      max-width: 600px;
      width: 90%;
      text-align: center;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
      position: relative;
      animation: fadeIn 0.3s ease;
    }

    /* Fade animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Close icon */
    .popup-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: transparent;
      border: none;
      font-size: 22px;
      font-weight: bold;
      color: #222221;
      cursor: pointer;
      transition: 0.2s;
    }

    .popup-close:hover {
      color: #ee3124;
    }

    /* Heading */
    .popup-box h2 {
      font-weight: 600;
      font-size: 23px;
      color: #222221;
      margin-bottom: 20px;
    }

    /* Paragraph */
    .popup-box p {
      font-size: 16px;
      color: #222221;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    /* Button inside popup */
    .popup-btn {
      background-color: #ee3124;
      color: white;
      text-decoration: none;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.3s;
      display: inline-block;
    }

    .popup-btn:hover {
      background-color: #c6281e;
    }
  </style>
</head>

<body>

  <!-- Button to open popup -->
  <button class="show-popup-btn" onclick="showPopup()">Show Popup</button>
  <button class="show-popup-btn" onclick="showPopup()">Show Popup</button>
  <button class="show-popup-btn" onclick="showPopup()">Show Popup</button>

  <!-- Popup Section -->
  <div class="popup-overlay" id="popup">
    <div class="popup-box">
      <button class="popup-close" onclick="closePopup()">×</button>
      <h2>VAI SER REDIRECCIONADO PARA O SITE KOBO.COM</h2>
      <p>
        Ao clicar em «30 DIAS GRÁTIS» vai sair do site leyaonline.com <br>
        e ser redirecionado para o site kobo.com para poder escolher <br>
        <b> a subscrição que pretende e iniciar os seus 30 dias grátis de Kobo Plus.</b>
      </p>
<a class="btn-kobo" href="https://www.kobo.com" target="_blank" rel="noopener noreferrer">
  Ir para kobo.com
  <svg class="arrow-icon" viewBox="0 0 20 20" width="16" height="16" aria-hidden="true" focusable="false">
    <path d="M7 4l5.5 6L7 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
      fill="none" />
  </svg>
</a>

<style>
  .btn-kobo {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    text-decoration: none;
    background-color: #ee3124;
    /* Button background */
    color: #fff;
    /* Text color */
    padding: 10px 20px;
    transition: background 0.3s, transform 0.3s;
  }


  .btn-kobo .arrow-icon {
    transition: transform 0.3s;
  }

  .btn-kobo:hover .arrow-icon {
    transform: translateX(3px);
    /* Arrow moves on hover */
  }
</style>


    </div>
  </div>

  <script>
    // Function to show popup
    function showPopup() {
      document.getElementById('popup').style.display = 'flex';
    }

    // Function to close popup
    function closePopup() {
      document.getElementById('popup').style.display = 'none';
    }
  </script>
</body>

</html>
